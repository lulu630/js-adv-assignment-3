<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Breed Gallery</title>
  <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

</head>
<body>
  <section class="logo">
    <h3>Cat Breed Explorer</h3>
    <img src="./images/cat-logo.svg" alt="">
  </section>


  <section class="hero">
  <h1 class="hero-title">Discover Amazing Cat Breeds</h1>
  <p class="hero-subtitle">Every cat breed has its own personality. Explore their temperament and characteristics to find the perfect companion for your home.</p>
  </section>


  <section class="control-tab">
  <div class="controls">
  <label for="limit-input">Number of breeds</label>

  <input
  type="number"
  id="limit-input"
  min="1"
  max="20"
  value="5"
  />
</div>
  <button id="load-cats-btn">Load</button>
</section>

  


  <section id="cats-container"></section>


</body>
</html>
